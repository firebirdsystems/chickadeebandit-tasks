<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <base href="/run/tasks/" />
  <title>Tasks</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:           var(--hub-bg, #f9fafb);
      --card:         var(--hub-surface, #ffffff);
      --border:       var(--hub-border, #e5e7eb);
      --border-mid:   var(--hub-border, #d1d5db);
      --text:         var(--hub-text, #000000);
      --muted:        var(--hub-text-muted, #6b7280);
      --accent:       var(--hub-primary, #111827);
      --accent-fg:    var(--hub-primary-fg, #ffffff);
      --accent-hover: var(--hub-primary-hover, #374151);
      --accent-light: #f3f4f6;
      --green: #16a34a; --amber: #d97706; --red: #dc2626;
      --radius:       var(--hub-radius, 0.5rem);
      --shadow:       0 1px 3px rgba(0,0,0,.07);
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: var(--hub-font-size, 15px); }
    .app { max-width: 680px; margin: 0 auto; padding: 20px 16px 60px; }

    /* Header */
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .header h1 { font-size: 1.5rem; font-weight: 700; }
    .header-actions { display: flex; gap: 8px; }
    .btn-primary { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 8px 16px; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: .5; cursor: default; }
    .btn-ghost { background: #fff; color: var(--muted); border: 1.5px solid var(--border); border-radius: 8px; padding: 8px 14px; font-size: 0.82rem; font-weight: 600; cursor: pointer; }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .btn-sm { padding: 5px 12px; border-radius: 6px; font-size: 0.78rem; font-weight: 600; cursor: pointer; border: 1.5px solid var(--border); background: #fff; color: var(--muted); }
    .btn-sm:hover { border-color: var(--accent); color: var(--text); }
    .btn-sm:disabled { opacity: .5; cursor: default; }
    .btn-danger { background: #fee2e2; color: var(--red); border: none; border-radius: 6px; padding: 7px 14px; font-size: 0.82rem; font-weight: 600; cursor: pointer; }
    .btn-danger:hover { background: #fecaca; }

    /* Tabs */
    .tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 16px; }
    .tab { padding: 8px 16px; font-size: 0.85rem; font-weight: 600; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -2px; background: transparent; border-left: none; border-right: none; border-top: none; }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* Filter chips */
    .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .chip { padding: 5px 13px; border-radius: 20px; border: 1.5px solid var(--border); background: #fff; font-size: 0.8rem; font-weight: 500; cursor: pointer; color: var(--muted); }
    .chip.active { border-color: var(--accent); background: var(--accent-light); color: var(--accent); font-weight: 600; }
    .chip:hover:not(.active) { border-color: #c7d2fe; }

    /* Quick add */
    .quick-add { display: flex; gap: 8px; margin-bottom: 16px; }
    .quick-add input { flex: 1; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.9rem; background: var(--card); color: var(--text); outline: none; }
    .quick-add input:focus { border-color: var(--accent); }
    .quick-add input::placeholder { color: var(--muted); }

    /* List sidebar area */
    .lists-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; align-items: center; }
    .list-pill { padding: 4px 12px; border-radius: 16px; font-size: 0.78rem; font-weight: 600; cursor: pointer; border: 1.5px solid transparent; background: #f3f4f6; color: var(--muted); }
    .list-pill.active { color: #fff; }
    .list-pill:hover:not(.active) { border-color: var(--border); background: #e5e7eb; }
    .list-pill-add { padding: 4px 10px; border-radius: 16px; font-size: 0.78rem; font-weight: 600; cursor: pointer; border: 1.5px dashed var(--border); background: transparent; color: var(--muted); }
    .list-pill-add:hover { border-color: var(--accent); color: var(--accent); }

    /* Task group */
    .task-group { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 12px; background: var(--card); box-shadow: var(--shadow); }
    .task-group-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: #f9fafb; border-bottom: 1px solid var(--border); }
    .task-group-header .member { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 0.88rem; }
    .task-count { font-size: 0.76rem; color: var(--muted); }

    /* Quick-add inbox */
    .inbox-group { border-color: var(--accent); }
    .inbox-icon { font-size: 0.95rem; }
    .inbox-hint { padding: 8px 16px; font-size: 0.76rem; color: var(--muted); border-bottom: 1px solid var(--border); background: var(--card); }
    .inbox-row { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--card); }
    .inbox-row:last-child { border-bottom: none; }
    .inbox-body { flex: 1; min-width: 0; }
    .inbox-title { font-size: 0.9rem; font-weight: 500; color: var(--text); word-break: break-word; }
    .inbox-meta { font-size: 0.74rem; color: var(--muted); margin-top: 2px; }
    .inbox-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .inbox-actions .btn-sm.btn-primary { color: #fff; border: none; }

    /* Task row */
    .task-row { display: flex; align-items: flex-start; gap: 0; padding: 0; border-bottom: 1px solid var(--border); cursor: pointer; background: var(--card); transition: background .1s; }
    .task-row:last-child { border-bottom: none; }
    .task-row:hover { background: #fafafa; }
    .task-row.done-row { opacity: .65; }
    .priority-bar { width: 4px; flex-shrink: 0; align-self: stretch; border-radius: 0; }
    .task-row-inner { display: flex; align-items: flex-start; gap: 10px; padding: 11px 14px; flex: 1; min-width: 0; }
    .check { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 11px; background: transparent; margin-top: 2px; }
    .check.done { background: var(--green); border-color: var(--green); color: #fff; }
    .check.overdue-check { border-color: var(--red); }
    .check:not(.done):hover { border-color: var(--accent); }
    .task-body { flex: 1; min-width: 0; }
    .task-title { font-size: 0.9rem; line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .task-title.done { text-decoration: line-through; color: var(--muted); }
    .task-sub { font-size: 0.75rem; color: var(--muted); margin-top: 3px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .task-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; margin-top: 2px; }
    .due-badge { font-size: 0.72rem; font-weight: 600; padding: 2px 7px; border-radius: 10px; background: #f3f4f6; color: var(--muted); white-space: nowrap; }
    .due-badge.today { background: #dbeafe; color: #1d4ed8; }
    .due-badge.overdue { background: #fee2e2; color: var(--red); }
    .due-badge.tomorrow { background: #dcfce7; color: #15803d; }
    .avatar { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; color: #fff; flex-shrink: 0; }
    .tag { font-size: 0.68rem; padding: 1px 6px; border-radius: 8px; background: #f3f4f6; color: var(--muted); }
    .subtask-count { font-size: 0.72rem; color: var(--muted); display: flex; align-items: center; gap: 3px; }

    /* Avatar large */
    .avatar-lg { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 700; color: #fff; }

    /* Empty / loading */
    .empty { text-align: center; padding: 48px 20px; color: var(--muted); }
    .empty h3 { font-size: 1rem; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .empty p { font-size: 0.85rem; line-height: 1.6; }
    .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 0.9rem; }

    /* Connections */
    .conn-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; gap: 12px; box-shadow: var(--shadow); }
    .conn-info .name { font-weight: 500; font-size: 0.9rem; }
    .conn-info .meta { font-size: 0.78rem; color: var(--muted); margin-top: 3px; display: flex; align-items: center; gap: 6px; }
    .conn-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .provider-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 0.73rem; padding: 2px 8px; border-radius: 12px; background: #f3f4f6; color: var(--muted); }

    /* Modal overlay */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
    @media (min-width: 600px) { .modal-overlay { align-items: center; } }
    .modal { background: var(--card); border-radius: 16px 16px 0 0; width: 100%; max-width: 600px; max-height: 92vh; overflow-y: auto; padding: 0; }
    @media (min-width: 600px) { .modal { border-radius: 16px; max-height: 85vh; } }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px 14px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--card); z-index: 1; }
    .modal-title { font-size: 1rem; font-weight: 700; }
    .modal-close { font-size: 1.3rem; background: none; border: none; cursor: pointer; color: var(--muted); padding: 4px 8px; border-radius: 6px; line-height: 1; }
    .modal-close:hover { background: #f3f4f6; }
    .modal-body { padding: 20px; }
    .modal-footer { display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; border-top: 1px solid var(--border); gap: 8px; }

    /* Form fields */
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .04em; }
    .field input, .field textarea, .field select { width: 100%; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.9rem; background: var(--card); color: var(--text); outline: none; font-family: inherit; }
    .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); }
    .field textarea { resize: vertical; min-height: 70px; line-height: 1.5; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .field-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

    /* Priority selector */
    .priority-opts { display: flex; gap: 6px; }
    .priority-opt { flex: 1; padding: 7px; border-radius: 7px; border: 1.5px solid var(--border); background: #fff; font-size: 0.78rem; font-weight: 600; cursor: pointer; text-align: center; color: var(--muted); }
    .priority-opt.sel-none { border-color: var(--border); background: #f9fafb; color: var(--muted); }
    .priority-opt.sel-low { border-color: #2563eb; background: #eff6ff; color: #2563eb; }
    .priority-opt.sel-med { border-color: var(--amber); background: #fffbeb; color: var(--amber); }
    .priority-opt.sel-high { border-color: var(--red); background: #fee2e2; color: var(--red); }

    /* Color picker */
    .color-opts { display: flex; gap: 8px; }
    .color-dot { width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 2.5px solid transparent; }
    .color-dot.sel { border-color: var(--text); }

    /* Recurrence */
    .recur-section { background: #f9fafb; border-radius: 8px; padding: 12px; margin-top: 8px; }
    .day-toggles { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
    .day-btn { width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid var(--border); background: #fff; font-size: 0.72rem; font-weight: 700; cursor: pointer; color: var(--muted); display: flex; align-items: center; justify-content: center; }
    .day-btn.on { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }

    /* Labels */
    .label-input-wrap { display: flex; gap: 6px; }
    .labels-list { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 6px; }
    .label-tag { display: flex; align-items: center; gap: 4px; font-size: 0.75rem; padding: 3px 8px; border-radius: 10px; background: #f3f4f6; color: var(--muted); }
    .label-tag button { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 0.8rem; padding: 0; line-height: 1; }
    .label-tag button:hover { color: var(--red); }

    /* Subtasks */
    .subtask-list { list-style: none; margin-bottom: 10px; }
    .subtask-item { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); }
    .subtask-item:last-child { border-bottom: none; }
    .subtask-title { flex: 1; font-size: 0.88rem; }
    .subtask-title.done { text-decoration: line-through; color: var(--muted); }
    .check-sm { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 9px; background: transparent; }
    .check-sm.done { background: var(--green); border-color: var(--green); color: #fff; }
    .check-sm:not(.done):hover { border-color: var(--accent); }

    /* Toast */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1f2937; color: #fff; padding: 11px 20px; border-radius: 10px; font-size: 0.85rem; z-index: 999; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 12px rgba(0,0,0,.25); }
    .toast button { background: none; border: none; color: #a5b4fc; font-size: 0.82rem; font-weight: 600; cursor: pointer; padding: 0; }
    .toast button:hover { color: #c7d2fe; }

    /* Section label */
    .section-label { font-size: 0.72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin: 16px 0 8px; }

    /* Login notice */
    .login-notice { text-align: center; padding: 60px 20px; }
    .login-notice h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; }
    .login-notice p { color: var(--muted); font-size: 0.88rem; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Tasks</h1>
    <div class="header-actions">
      <button class="btn-ghost" id="sync-btn" onclick="syncAll()">Sync now</button>
      <button class="btn-primary" onclick="openNewTask()">+ New</button>
    </div>
  </div>
  <div id="root"><div class="loading">Loading…</div></div>
</div>

<!-- Task detail / edit modal -->
<div id="task-modal" style="display:none" class="modal-overlay" onclick="modalOverlayClick(event)">
  <div class="modal" id="task-modal-box">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">New Task</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- List modal -->
<div id="list-modal" style="display:none" class="modal-overlay" onclick="listModalOverlayClick(event)">
  <div class="modal" id="list-modal-box" style="max-width:400px">
    <div class="modal-header">
      <span class="modal-title" id="list-modal-title">New List</span>
      <button class="modal-close" onclick="closeListModal()">×</button>
    </div>
    <div class="modal-body" id="list-modal-body"></div>
    <div class="modal-footer" id="list-modal-footer"></div>
  </div>
</div>

<script type="module">
import { memberColor, initial, esc, isAdult, hubConfirm } from "/hub-sdk.js";
import {
  PRIORITY_COLORS, PRIORITY_LABELS, PRIORITY_CLASSES,
  DAYS, DAY_LABELS,
  todayStr, parseLabels,
  isOverdue, isToday, isTomorrow, isUpcoming, formatDue,
  nextDueDate, sortTasks,
} from "./logic.js";

const CONTEXT = window.__CONTEXT_URL ?? "";
const DB      = window.__DB_URL ?? "";
const ME      = window.__CURRENT_MEMBER ?? null;
const APP_ID  = window.__APP_ID ?? "tasks";

const LIST_COLORS = ["#4f46e5","#0891b2","#16a34a","#d97706","#dc2626","#7c3aed"];

// State
let members = [], syncedTasks = [], connections = [];
let localLists = [], localTasks = [], localSubtasks = [];
let inboxItems = [];             // household-shared quick-add captures (from kiosk)
let pendingInboxId = null;       // inbox row to consume when the next new-task save succeeds
let activeTab = "mine";
let mineFilter = "all";
let activeListId = null;
let modalTask = null;       // task being edited
let modalIsNew = false;
let listModalData = null;   // list being edited
let toastTimer = null;
let undoData = null;        // {task, action}

// ── DB ────────────────────────────────────────────────────────────────────────
async function dbRun(sql, params = []) {
  if (!DB) return { rows: [] };
  try {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), 15000);
    const res = await fetch(DB, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sql, params }),
      signal: ctrl.signal,
    });
    clearTimeout(t);
    return await res.json();
  } catch { return { rows: [] }; }
}

async function initDB() {
  // Schema managed by hub migrations
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function now() { return new Date().toISOString(); }

function memberById(id) { return members.find(m => m.id === id); }
function memberName(id) { return memberById(id)?.name ?? "Unknown"; }
function mcolor(id) { return memberColor(id, members); }
function jsArg(value) { return esc(JSON.stringify(String(value))); }
function safeListColor(value) { return LIST_COLORS.includes(value) ? value : LIST_COLORS[0]; }

// ── Load data ─────────────────────────────────────────────────────────────────
async function load() {
  await initDB();
  const [ctxRes, tasksRes, connRes, listsRes, localRes, subRes, inboxRes] = await Promise.all([
    fetch(`${CONTEXT}?keys=family.members`).then(r => r.json()).catch(() => ({ "family.members": [] })),
    fetch(`/api/tasks${ME?.id ? `?memberId=${encodeURIComponent(ME.id)}` : ""}`).then(r => r.json()).catch(() => []),
    fetch("/api/tasks/connections").then(r => r.json()).catch(() => []),
    dbRun("SELECT * FROM app_tasks__lists ORDER BY sort_order, created_at"),
    dbRun("SELECT * FROM app_tasks__tasks WHERE parent_id IS NULL ORDER BY due_date, priority DESC, created_at"),
    dbRun("SELECT * FROM app_tasks__tasks WHERE parent_id IS NOT NULL ORDER BY created_at"),
    dbRun("SELECT * FROM app_tasks__inbox ORDER BY created_at DESC, title"),
  ]);
  members     = ctxRes["family.members"] ?? [];
  syncedTasks = Array.isArray(tasksRes) ? tasksRes : [];
  connections = Array.isArray(connRes)  ? connRes  : [];
  localLists  = listsRes.rows ?? [];
  localTasks  = localRes.rows ?? [];
  inboxItems  = inboxRes.rows ?? [];

  localSubtasks = subRes.rows ?? [];

  render();
}

async function reloadLocal() {
  const [listsRes, localRes, subRes, inboxRes] = await Promise.all([
    dbRun("SELECT * FROM app_tasks__lists ORDER BY sort_order, created_at"),
    dbRun("SELECT * FROM app_tasks__tasks WHERE parent_id IS NULL ORDER BY due_date, priority DESC, created_at"),
    dbRun("SELECT * FROM app_tasks__tasks WHERE parent_id IS NOT NULL ORDER BY created_at"),
    dbRun("SELECT * FROM app_tasks__inbox ORDER BY created_at DESC, title"),
  ]);
  localLists    = listsRes.rows ?? [];
  localTasks    = localRes.rows ?? [];
  localSubtasks = subRes.rows ?? [];
  inboxItems    = inboxRes.rows ?? [];
}

// ── Task CRUD ─────────────────────────────────────────────────────────────────
async function createTask(fields, id = uid(), ts = now()) {
  await dbRun(
    `INSERT INTO app_tasks__tasks (id,list_id,title,notes,assignee_id,due_date,due_time,priority,labels,recurrence,completed,parent_id,created_by,created_at,updated_at)
     VALUES (?,?,?,?,?,?,?,?,?,?,0,?,?,?,?)`,
    [id, fields.list_id||null, fields.title, fields.notes||"",
     fields.assignee_id||null, fields.due_date||null, fields.due_time||null,
     fields.priority||0, JSON.stringify(fields.labels||[]),
     fields.recurrence ? JSON.stringify(fields.recurrence) : null,
     fields.parent_id||null, ME?.id||null, ts, ts]
  );
  return id;
}

async function updateTask(id, fields) {
  const sets = Object.keys(fields).map(k => `${k}=?`).join(",");
  const vals = Object.values(fields);
  await dbRun(`UPDATE app_tasks__tasks SET ${sets}, updated_at=? WHERE id=?`, [...vals, now(), id]);
}

async function deleteTask(id) {
  await dbRun("DELETE FROM app_tasks__tasks WHERE id=? OR parent_id=?", [id, id]);
}

async function completeTask(id) {
  const task = localTasks.find(t => t.id === id);
  if (!task) return;
  const wasCompleted = !!task.completed;
  const origCompletedAt = task.completed_at;
  const newCompleted = wasCompleted ? 0 : 1;
  const completedAt  = newCompleted ? now() : null;

  // Optimistic update: reflect change immediately before any DB work
  task.completed = newCompleted;
  task.completed_at = completedAt;
  render();

  showToast(
    newCompleted ? "Task completed" : "Marked incomplete",
    newCompleted ? "Undo" : null,
    async () => {
      task.completed = wasCompleted ? 1 : 0;
      task.completed_at = origCompletedAt;
      render();
      await updateTask(id, { completed: wasCompleted ? 1 : 0, completed_at: origCompletedAt });
    }
  );

  try {
    await updateTask(id, { completed: newCompleted, completed_at: completedAt });

    // Handle recurrence: when marking complete, clone with next due date
    if (newCompleted && task.recurrence && task.due_date) {
      try {
        const rule = JSON.parse(task.recurrence);
        const nextDate = nextDueDate(task.due_date, rule);
        if (nextDate) {
          await createTask({
            list_id: task.list_id,
            title: task.title,
            notes: task.notes,
            assignee_id: task.assignee_id,
            due_date: nextDate,
            due_time: task.due_time,
            priority: task.priority,
            labels: parseLabels(task.labels),
            recurrence: rule,
            parent_id: null,
          });
          await reloadLocal();
          render();
        }
      } catch {}
    }
  } catch {
    // Revert on DB failure
    task.completed = wasCompleted ? 1 : 0;
    task.completed_at = origCompletedAt;
    render();
    showToast("Failed to update task");
  }
}

// ── List CRUD ─────────────────────────────────────────────────────────────────
async function createList(name, color, visibility) {
  const id = uid();
  // member_id is forced to the caller by the owner_or_visibility policy; passing
  // ME.id keeps private lists owned by their creator. Sharing is carried by
  // `visibility` ("everyone" => readable by all members).
  await dbRun(
    "INSERT INTO app_tasks__lists (id,name,color,member_id,visibility,sort_order,created_at) VALUES (?,?,?,?,?,?,?)",
    [id, name, color, ME?.id || null, visibility === "everyone" ? "everyone" : "private", localLists.length, now()]
  );
  return id;
}

async function updateList(id, fields) {
  const sets = Object.keys(fields).map(k => `${k}=?`).join(",");
  await dbRun(`UPDATE app_tasks__lists SET ${sets} WHERE id=?`, [...Object.values(fields), id]);
}

async function deleteList(id) {
  await dbRun("UPDATE app_tasks__tasks SET list_id=NULL WHERE list_id=?", [id]);
  await dbRun("DELETE FROM app_tasks__lists WHERE id=?", [id]);
}

async function syncAll() {
  const btn = document.getElementById("sync-btn");
  if (!btn) return;
  btn.disabled = true; btn.textContent = "Syncing…";
  await Promise.all(connections.map(c =>
    fetch(`/api/tasks/connections/${c.id}/sync`, { method: "POST" }).catch(() => {})
  ));
  const [tasksRes, connRes] = await Promise.all([
    fetch("/api/tasks").then(r => r.json()).catch(() => []),
    fetch("/api/tasks/connections").then(r => r.json()).catch(() => []),
  ]);
  syncedTasks = Array.isArray(tasksRes) ? tasksRes : [];
  connections = Array.isArray(connRes)  ? connRes  : [];
  btn.disabled = false; btn.textContent = "Sync now";
  render();
  showToast("Synced");
}

async function syncConnection(id) {
  await fetch(`/api/tasks/connections/${id}/sync`, { method: "POST" }).catch(() => {});
  const [tasksRes, connRes] = await Promise.all([
    fetch("/api/tasks").then(r => r.json()).catch(() => []),
    fetch("/api/tasks/connections").then(r => r.json()).catch(() => []),
  ]);
  syncedTasks = Array.isArray(tasksRes) ? tasksRes : [];
  connections = Array.isArray(connRes)  ? connRes  : [];
  render();
  showToast("Synced");
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg, undoLabel, undoFn) {
  clearTimeout(toastTimer);
  document.querySelectorAll(".toast").forEach(el => el.remove());
  const el = document.createElement("div");
  el.className = "toast";
  el.innerHTML = `<span>${esc(msg)}</span>`;
  if (undoLabel && undoFn) {
    const btn = document.createElement("button");
    btn.textContent = undoLabel;
    btn.onclick = () => { el.remove(); undoFn(); };
    el.appendChild(btn);
  }
  document.body.appendChild(el);
  toastTimer = setTimeout(() => el.remove(), 3000);
}

// ── Filters ───────────────────────────────────────────────────────────────────
function filterLocalTasks() {
  let tasks = localTasks.filter(t => !t.parent_id);
  const meId = ME?.id;

  if (activeTab === "mine") {
    // My tasks: I'm assignee or creator
    if (meId) tasks = tasks.filter(t => t.assignee_id === meId || (!t.assignee_id && t.created_by === meId) || (!t.assignee_id && !t.created_by));
    if (activeListId) tasks = tasks.filter(t => t.list_id === activeListId);
    if (mineFilter === "today")    tasks = tasks.filter(t => !t.completed && (isToday(t) || isOverdue(t)));
    else if (mineFilter === "upcoming") tasks = tasks.filter(t => !t.completed && isUpcoming(t));
    else if (mineFilter === "overdue")  tasks = tasks.filter(t => !t.completed && isOverdue(t));
    else if (mineFilter === "done")     tasks = tasks.filter(t => !!t.completed);
    else tasks = tasks.filter(t => !t.completed); // "all" = incomplete
  } else if (activeTab === "family") {
    // Adults see all; children see only their own
    if (!ME || (!isAdult(ME, members) && meId)) {
      tasks = tasks.filter(t => t.assignee_id === meId || t.created_by === meId);
    }
    tasks = tasks.filter(t => !t.completed);
  }

  return sortTasks(tasks);
}

  return `

      <div class="task-row-inner">

          onclick="event.stopPropagation();completeTask(${jsArg(t.id)})">
          ${t.completed ? "✓" : ""}
        </button>
        <div class="task-body">
          <div class="task-title ${t.completed ? 'done' : ''}">${esc(t.title)}</div>
          <div class="task-sub">
            ${subsTotal > 0 ? `<span class="subtask-count">☑ ${subsDone}/${subsTotal}</span>` : ""}
            ${labels.map(l => `<span class="tag">${esc(l)}</span>`).join("")}
          </div>

          ${assignee ? `<div class="avatar" style="background:${mcolor(assignee.id)}" title="${esc(assignee.name)}">${esc(initial(assignee.name))}</div>` : ""}
          ${t.list_id ? (() => { const l = localLists.find(x => x.id === t.list_id); const color = safeListColor(l?.color); return l ? `<span class="tag" style="background:${color}18;color:${color}">${esc(l.name)}</span>` : ""; })() : ""}

function renderInbox() {

function renderMineTab() {

  return `
    ${renderInbox()}

function renderFamilyTab() {
  const tasks = filterLocalTasks();
  if (!ME) return `<div class="login-notice"><h2>Please log in</h2><p>Sign in to see family tasks.</p></div>`;

  // Group by assignee
  const grouped = {};
  for (const t of tasks) {
    const key = t.assignee_id || t.created_by || "unassigned";
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(t);
  }

  if (tasks.length === 0) return `<div class="empty"><h3>No family tasks</h3><p>Tasks assigned to family members will appear here.</p></div>`;

  return Object.entries(grouped).map(([membId, mtasks]) => {
    const m = memberById(membId);
    const open = mtasks.filter(t => !t.completed).length;
    return `
      <div class="task-group">
        <div class="task-group-header">
          <div class="member">
            ${m ? `<div class="avatar-lg" style="background:${mcolor(membId)}">${esc(initial(m.name))}</div>${esc(m.name)}` : `<div class="avatar-lg" style="background:#9ca3af">?</div>Unassigned`}
          </div>
          <span class="task-count">${open} open</span>
        </div>
        ${mtasks.map(renderTaskRow).join("")}
      </div>`;
  }).join("");
}

function renderSyncedTab() {
  if (syncedTasks.length === 0 && connections.length === 0) {
    return `<div class="empty">
      <h3>No synced tasks</h3>
      <p>Connect Google Tasks or Apple Reminders in the <strong>Connections</strong> tab to sync your tasks here.</p>
    </div>`;
  }
  if (syncedTasks.length === 0) {
    return `<div class="empty"><p>No synced tasks yet. Try "Sync now".</p></div>`;
  }

  // Group by member
  const memberIds = [...new Set(syncedTasks.map(t => t.family_member_id))];
  return memberIds.map(memberId => {
    const mTasks = syncedTasks
      .filter(t => t.family_member_id === memberId)
      .sort((a, b) => {
        if (a.completed !== b.completed) return a.completed ? 1 : -1;
        const aOver = !a.completed && a.due_at && new Date(a.due_at) < new Date();
        const bOver = !b.completed && b.due_at && new Date(b.due_at) < new Date();
        if (aOver !== bOver) return aOver ? -1 : 1;
        if (a.due_at && b.due_at) return a.due_at.localeCompare(b.due_at);
        return a.due_at ? -1 : b.due_at ? 1 : 0;
      });
    const open = mTasks.filter(t => !t.completed).length;
    const m = memberById(memberId);
    return `
      <div class="task-group">
        <div class="task-group-header">
          <div class="member">
            ${m ? `<div class="avatar-lg" style="background:${mcolor(memberId)}">${esc(initial(m.name))}</div>${esc(m.name)}` : esc(memberId)}
          </div>
          <span class="task-count">${open} open · ${mTasks.length} total</span>
        </div>
        ${mTasks.map(t => {
          const overdue = !t.completed && t.due_at && new Date(t.due_at) < new Date();
          const today = t.due_at && new Date(t.due_at).toDateString() === new Date().toDateString();
          let dueLabel = null, dueCls = "";
          if (t.due_at && !t.completed) {
            const d = new Date(t.due_at);
            const tom = new Date(); tom.setDate(tom.getDate()+1);
            if (overdue) { dueLabel = "Overdue"; dueCls = "overdue"; }
            else if (today) { dueLabel = "Today"; dueCls = "today"; }
            else if (d.toDateString() === tom.toDateString()) { dueLabel = "Tomorrow"; dueCls = "tomorrow"; }
            else dueLabel = d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
          }
          return `
            <div class="task-row ${t.completed?'done-row':''}" style="cursor:default">
              <div class="priority-bar"></div>
              <div class="task-row-inner">
                <div class="check ${t.completed?'done':''} ${overdue?'overdue-check':''}" aria-hidden="true">
                  ${t.completed ? "✓" : ""}
                </div>
                <div class="task-body">
                  <div class="task-title ${t.completed?'done':''}">${esc(t.title)}</div>
                  <div class="task-sub">
                    ${t.list_name ? `<span>${esc(t.list_name)}</span>` : ""}
                    ${t.notes ? `<span>${esc(t.notes.slice(0,60))}${t.notes.length>60?"…":""}</span>` : ""}
                  </div>
                </div>
                <div class="task-right">
                  ${dueLabel ? `<span class="due-badge ${dueCls}">${esc(dueLabel)}</span>` : ""}
                </div>
              </div>
            </div>`;
        }).join("")}
      </div>`;
  }).join("");
}

function renderConnectionsTab() {
  if (connections.length === 0) {
    return `<div class="empty">
      <h3>No connections yet</h3>
      <p>Connect Google Tasks or Apple Reminders to sync tasks into the hub.<br><br>
      <strong>Google Tasks:</strong> Requires a Google OAuth client ID configured in your hub's environment variables.<br>
      <strong>Apple Reminders:</strong> Requires an app-specific password.</p>
    </div>`;
  }
  return connections.map(c => `
    <div class="conn-card">
      <div class="conn-info">
        <div class="name">${esc(c.label)}</div>
        <div class="meta">
          <span class="provider-badge">${esc(c.provider)}</span>
          ${esc(memberName(c.family_member_id))} ·
          ${c.last_synced_at ? "Last synced " + new Date(c.last_synced_at).toLocaleDateString() : "Never synced"}
        </div>
      </div>
      <div class="conn-actions">
        <button class="btn-sm" onclick="syncConnection(${jsArg(c.id)})">Sync</button>
      </div>
    </div>
  `).join("");
}

function render() {
  if (!ME) {
    document.getElementById("root").innerHTML = `
      <div class="login-notice">
        <h2>Please log in</h2>
        <p>Sign in to use Tasks.</p>
      </div>`;
    return;
  }

  const tabContent = {
    mine:        renderMineTab,
    family:      renderFamilyTab,
    synced:      renderSyncedTab,
    connections: renderConnectionsTab,
  };

  document.getElementById("root").innerHTML = `
    <div class="tabs">
      <button class="tab ${activeTab==='mine'?'active':''}"        onclick="setTab('mine')">My Tasks</button>
      <button class="tab ${activeTab==='family'?'active':''}"      onclick="setTab('family')">Family</button>
      <button class="tab ${activeTab==='synced'?'active':''}"      onclick="setTab('synced')">Synced</button>
      <button class="tab ${activeTab==='connections'?'active':''}" onclick="setTab('connections')">Connections</button>
    </div>
    ${(tabContent[activeTab] || tabContent.mine)()}
  `;
}

}

function openTaskModal(task, isNew) {
  modalTask  = task;
  modalIsNew = isNew;
  document.getElementById("modal-title").textContent = isNew ? "New Task" : "Edit Task";
  document.getElementById("modal-body").innerHTML   = buildModalForm(task, isNew);
  document.getElementById("modal-footer").innerHTML = buildModalFooter(task, isNew);
  document.getElementById("task-modal").style.display = "flex";
  setTimeout(() => { const el = document.getElementById("f-title"); if (el) el.focus(); }, 50);
}

window.openNewTask = function() {
  pendingInboxId = null;
  const defaultList = activeListId || (localLists.find(l => l.visibility === "everyone" || l.member_id === ME?.id)?.id || null);
  openTaskModal({
    id: null, list_id: defaultList, title: "", notes: "", assignee_id: ME?.id || null,
    due_date: null, due_time: null, priority: 0, labels: "[]", recurrence: null,
    completed: 0, parent_id: null,
  }, true);
};

// Turn a quick-add capture into a real (owner_only) task: open the New Task
// modal prefilled with the captured title. The inbox row is consumed only when
// the task is actually saved (see saveTask), so cancelling leaves it in place.
window.assignInboxItem = function(inboxId) {
  const item = inboxItems.find(i => i.id === inboxId);
  if (!item) return;
  const defaultList = activeListId || (localLists.find(l => l.visibility === "everyone" || l.member_id === ME?.id)?.id || null);
  openTaskModal({
    id: null, list_id: defaultList, title: item.title, notes: "", assignee_id: ME?.id || null,
    due_date: null, due_time: null, priority: 0, labels: "[]", recurrence: null,
    completed: 0, parent_id: null,
  }, true);
  pendingInboxId = inboxId;
};

window.dismissInboxItem = async function(inboxId) {
  const item = inboxItems.find(i => i.id === inboxId);
  if (!item) return;
  if (!await hubConfirm({ message: "Dismiss this quick-add?", description: esc(item.title), confirmLabel: "Dismiss", destructive: true })) return;
  inboxItems = inboxItems.filter(i => i.id !== inboxId);
  render();
  await dbRun("DELETE FROM app_tasks__inbox WHERE id=?", [inboxId]);
  showToast("Dismissed");
};

window.openTask = function(id) {
  const task = localTasks.find(t => t.id === id);
  if (!task) return;
  openTaskModal(task, false);
};

window.closeModal = function() {
  document.getElementById("task-modal").style.display = "none";
  modalTask = null;
  pendingInboxId = null;
};

window.modalOverlayClick = function(e) {
  if (e.target === document.getElementById("task-modal")) closeModal();
};

window.setModalPriority = function(p) {
  if (modalTask) modalTask.priority = p;
  document.querySelectorAll(".priority-opt").forEach(btn => {
    const bp = parseInt(btn.dataset.p);
    btn.className = "priority-opt " + (bp === p ? PRIORITY_CLASSES[p] : "");
  });
};

window.updateRecurUI = function() {
  const freq = document.getElementById("f-recur-freq")?.value;
  const detail = document.getElementById("recur-detail");
  const dayWrap = document.getElementById("day-toggle-wrap");
  if (!detail) return;
  detail.style.display = (freq && freq !== "none") ? "block" : "none";
  if (dayWrap) dayWrap.style.display = freq === "weekly" ? "block" : "none";
};

window.updateRecurEndUI = function() {
  const val = document.getElementById("f-recur-end")?.value;
  const cw = document.getElementById("recur-count-wrap");
  const dw = document.getElementById("recur-date-wrap");
  if (cw) cw.style.display = val === "count" ? "block" : "none";
  if (dw) dw.style.display = val === "date"  ? "block" : "none";
};

window.toggleDay = function(day) {
  const btn = document.querySelector(`.day-btn[data-day="${day}"]`);
  if (!btn) return;
  btn.classList.toggle("on");
};

// Labels management in modal
let _modalLabels = [];
function syncModalLabels() {
  if (!modalTask) return;
  _modalLabels = parseLabels(modalTask.labels);
}
window.addLabel = function(e) {
  if (e && e.key !== "Enter") return;
  const inp = document.getElementById("f-label-input");
  if (!inp) return;
  const val = inp.value.trim();
  if (!val) return;
  syncModalLabels();
  if (!_modalLabels.includes(val)) _modalLabels.push(val);
  inp.value = "";
  refreshLabelsList();
};
window.removeLabel = function(i) {
  syncModalLabels();
  _modalLabels.splice(i, 1);
  refreshLabelsList();
};
function refreshLabelsList() {
  const el = document.getElementById("labels-list");
  if (!el) return;
  el.innerHTML = _modalLabels.map((l,i) =>
    `<span class="label-tag">${esc(l)}<button onclick="removeLabel(${i})">×</button></span>`
  ).join("");
}

function buildRecurrenceFromForm() {
  const freq = document.getElementById("f-recur-freq")?.value;
  if (!freq || freq === "none") return null;
  const rule = {};
  if (freq === "daily")    { rule.freq = "daily"; rule.interval = 1; }
  else if (freq === "weekdays") { rule.freq = "weekly"; rule.interval = 1; rule.days = ["mon","tue","wed","thu","fri"]; }
  else if (freq === "weekly")   { rule.freq = "weekly"; rule.interval = 1; rule.days = [...document.querySelectorAll(".day-btn.on")].map(b => b.dataset.day); }
  else if (freq === "biweekly") { rule.freq = "weekly"; rule.interval = 2; }
  else if (freq === "monthly")  { rule.freq = "monthly"; rule.interval = 1; }
  else if (freq === "yearly")   { rule.freq = "yearly"; rule.interval = 1; }
  const endType = document.getElementById("f-recur-end")?.value || "never";
  rule.end_type = endType;
  if (endType === "count") rule.count = parseInt(document.getElementById("f-recur-count")?.value) || null;
  if (endType === "date")  rule.end_date = document.getElementById("f-recur-end-date")?.value || null;
  return rule;
}

window.saveTask = async function() {
  const title = document.getElementById("f-title")?.value.trim();
  if (!title) { showToast("Title is required"); return; }
  const btn = document.getElementById("modal-footer")?.querySelector(".btn-primary");
  if (btn) { btn.disabled = true; btn.textContent = "Saving…"; }
  syncModalLabels();
  const fields = {
    title,
    notes:       document.getElementById("f-notes")?.value || "",
    priority:    modalTask?.priority ?? 0,
    due_date:    document.getElementById("f-due-date")?.value || null,
    due_time:    document.getElementById("f-due-time")?.value || null,
    assignee_id: document.getElementById("f-assignee")?.value || null,
    list_id:     document.getElementById("f-list")?.value || null,
    labels:      _modalLabels,
    recurrence:  buildRecurrenceFromForm(),
  };

  if (modalIsNew) {
    const consumeInboxId = pendingInboxId;   // capture before closeModal() clears it
    const id = uid();
    const ts = now();
    localTasks.push({
      id,
      list_id: fields.list_id || null,
      title: fields.title,
      notes: fields.notes || "",
      assignee_id: fields.assignee_id || null,
      due_date: fields.due_date || null,
      due_time: fields.due_time || null,
      priority: fields.priority || 0,
      labels: JSON.stringify(fields.labels || []),
      recurrence: fields.recurrence ? JSON.stringify(fields.recurrence) : null,
      completed: 0,
      parent_id: null,
      created_by: ME?.id || null,
      created_at: ts,
      updated_at: ts,
    });
    if (consumeInboxId) inboxItems = inboxItems.filter(i => i.id !== consumeInboxId);
    closeModal();
    render();
    showToast("Task created");
    await createTask(fields, id, ts);
    if (consumeInboxId) await dbRun("DELETE FROM app_tasks__inbox WHERE id=?", [consumeInboxId]);
  } else {
    const updateFields = { ...fields, labels: JSON.stringify(fields.labels), recurrence: fields.recurrence ? JSON.stringify(fields.recurrence) : null };
    const taskId = modalTask.id;
    // Optimistic: update the in-memory object directly (modalTask is a reference into localTasks)
    Object.assign(modalTask, updateFields);
    closeModal();
    render();
    await updateTask(taskId, updateFields);
    showToast("Task saved");
  }
};

window.confirmDeleteTask = async function(id) {
  if (!await hubConfirm({ message: "Delete this task?", description: "Subtasks will also be removed.", confirmLabel: "Delete", destructive: true })) return;
  deleteTask(id).then(async () => {
    closeModal();
    await reloadLocal();
    render();
    showToast("Task deleted");
  });
};

window.duplicateTask = async function(id) {
  const task = localTasks.find(t => t.id === id);
  if (!task) return;
  await createTask({
    list_id: task.list_id,
    title: task.title + " (copy)",
    notes: task.notes,
    assignee_id: task.assignee_id,
    due_date: task.due_date,
    due_time: task.due_time,
    priority: task.priority,
    labels: parseLabels(task.labels),
    recurrence: task.recurrence ? JSON.parse(task.recurrence) : null,
  });
  closeModal();
  await reloadLocal();
  render();
  showToast("Task duplicated");
};

// Subtasks
function renderSubtaskList(parentId) {
  const list = document.getElementById("subtask-list");
  if (!list) return;
  const subs = localSubtasks.filter(s => s.parent_id === parentId);
  list.innerHTML = subs.map(s => `
    <li class="subtask-item" data-sub="${esc(s.id)}">
      <button class="check-sm ${s.completed?'done':''}" onclick="toggleSubtask(${jsArg(s.id)})">${s.completed?'✓':''}</button>
      <span class="subtask-title ${s.completed?'done':''}">${esc(s.title)}</span>
      <button class="btn-sm" style="padding:3px 8px;font-size:.7rem" onclick="deleteSubtask(${jsArg(s.id)})">×</button>
    </li>
  `).join("");
}

window.toggleSubtask = async function(id) {
  const sub = localSubtasks.find(s => s.id === id);
  if (!sub) return;
  const wasCompleted = !!sub.completed;
  const newVal = wasCompleted ? 0 : 1;

  // Optimistic update
  sub.completed = newVal;
  sub.completed_at = newVal ? now() : null;
  if (modalTask) renderSubtaskList(modalTask.id);

  try {
    await updateTask(id, { completed: newVal, completed_at: newVal ? now() : null });
  } catch {
    // Revert on failure
    sub.completed = wasCompleted ? 1 : 0;
    sub.completed_at = wasCompleted ? sub.completed_at : null;
    if (modalTask) renderSubtaskList(modalTask.id);
  }
};

window.addSubtask = async function(e, parentId) {
  if (e && e.key !== "Enter") return;
  const inp = document.getElementById("sub-input");
  if (!inp) return;
  const val = inp.value.trim();
  if (!val) return;
  const id = uid();
  const ts = now();
  const parent = localTasks.find(t => t.id === parentId);
  const assigneeId = parent?.assignee_id || ME?.id || null;
  await dbRun(
    `INSERT INTO app_tasks__tasks (id,list_id,title,notes,assignee_id,due_date,due_time,priority,labels,recurrence,completed,parent_id,created_by,created_at,updated_at)
     VALUES (?,?,?,?,?,?,?,0,'[]',NULL,0,?,?,?,?)`,
    [id, null, val, "", assigneeId, null, null, parentId, ME?.id||null, ts, ts]
  );
  inp.value = "";
  await reloadLocal();
  renderSubtaskList(parentId);
};

window.deleteSubtask = async function(id) {
  await dbRun("DELETE FROM app_tasks__tasks WHERE id=?", [id]);
  await reloadLocal();
  if (modalTask) renderSubtaskList(modalTask.id);
};

// Quick add
window.quickAdd = async function(e) {
  if (e.key !== "Enter") return;
  const inp = document.getElementById("quick-input");
  if (!inp) return;
  const val = inp.value.trim();
  if (!val) return;
  inp.value = "";

  const id = uid();
  const ts = now();
  const defaultList = activeListId || null;
  localTasks.push({
    id, list_id: defaultList, title: val, notes: "", assignee_id: ME?.id || null,
    due_date: null, due_time: null, priority: 0, labels: "[]", recurrence: null,
    completed: 0, parent_id: null, created_by: ME?.id || null, created_at: ts, updated_at: ts,
  });
  render();

  await createTask({ title: val, list_id: defaultList, assignee_id: ME?.id || null, priority: 0, labels: [] }, id, ts);
};

// ── List Modal ────────────────────────────────────────────────────────────────
function openListModal(list, isNew) {
  listModalData = list ? { ...list, color: safeListColor(list.color) } : { id: null, name: "", color: LIST_COLORS[0], member_id: ME?.id || null, visibility: "private" };
  const ln = listModalData;
  document.getElementById("list-modal-title").textContent = isNew ? "New List" : "Edit List";
  document.getElementById("list-modal-body").innerHTML = `
    <div class="field">
      <label>Name</label>
      <input type="text" id="lf-name" value="${esc(ln.name)}" placeholder="List name" />
    </div>
    <div class="field">
      <label>Color</label>
      <div class="color-opts">
        ${LIST_COLORS.map(c => `
          <div class="color-dot ${ln.color===c?'sel':''}" style="background:${c}" onclick="setListColor('${c}')" data-color="${c}"></div>
        `).join("")}
      </div>
    </div>
    <div class="field">
      <label>Visibility</label>
      <select id="lf-visibility">
        <option value="private" ${ln.visibility!=="everyone"?'selected':''}>Private (only me)</option>
        <option value="everyone" ${ln.visibility==="everyone"?'selected':''}>Everyone</option>
      </select>
    </div>
  `;
  document.getElementById("list-modal-footer").innerHTML = `
    <div>
      ${!isNew ? `<button class="btn-danger" onclick="confirmDeleteList(${jsArg(ln.id)})">Delete</button>` : ""}
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-ghost" onclick="closeListModal()">Cancel</button>
      <button class="btn-primary" onclick="saveList(${isNew})">Save</button>
    </div>`;
  document.getElementById("list-modal").style.display = "flex";
  setTimeout(() => { const el = document.getElementById("lf-name"); if (el) { el.focus(); el.select(); } }, 50);
}

window.openNewList = function() { openListModal(null, true); };

window.closeListModal = function() {
  document.getElementById("list-modal").style.display = "none";
  listModalData = null;
};

window.listModalOverlayClick = function(e) {
  if (e.target === document.getElementById("list-modal")) closeListModal();
};

window.setListColor = function(c) {
  if (listModalData) listModalData.color = c;
  document.querySelectorAll(".color-dot").forEach(d => {
    d.classList.toggle("sel", d.dataset.color === c);
  });
};

window.saveList = async function(isNew) {
  const name = document.getElementById("lf-name")?.value.trim();
  if (!name) { showToast("Name is required"); return; }
  const btn = document.getElementById("list-modal-footer")?.querySelector(".btn-primary");
  if (btn) { btn.disabled = true; btn.textContent = "Saving…"; }
  const color = listModalData?.color || LIST_COLORS[0];
  const visibility = document.getElementById("lf-visibility")?.value === "everyone" ? "everyone" : "private";

  if (isNew) {
    await createList(name, color, visibility);
  } else {
    await updateList(listModalData.id, { name, color, visibility });
  }
  closeListModal();
  await reloadLocal();
  render();
};

window.confirmDeleteList = async function(id) {
  if (!await hubConfirm({ message: "Delete this list?", description: "Tasks in it will become unassigned.", confirmLabel: "Delete list", destructive: true })) return;
  deleteList(id).then(async () => {
    if (activeListId === id) activeListId = null;
    closeListModal();
    await reloadLocal();
    render();
    showToast("List deleted");
  });
};

// ── Global nav ────────────────────────────────────────────────────────────────
window.setTab        = (t) => { activeTab = t; render(); };
window.setMineFilter = (f) => { mineFilter = f; render(); };
window.setActiveList = (id) => { activeListId = id; render(); };
window.completeTask  = completeTask;
window.syncAll       = syncAll;
window.syncConnection = syncConnection;

function handleDeepLink() {
  const taskId = new URLSearchParams(window.location.search).get("taskId");
  if (!taskId) return;
  openTask(taskId);
}

load().then(handleDeepLink).catch(err => {
  console.error("Tasks failed to load:", err);
  const root = document.getElementById("root");
  if (root) root.innerHTML = `<div class="empty"><h3>Failed to load</h3><p>${esc(err?.message ?? "Unknown error")}</p></div>`;
});
</script>
